- name: Install dependencies for batman-adv
  ansible.builtin.apt:
    name:
      [
        "linux-headers-generic",
        "libnl-3-dev",
        "libnl-genl-3-dev",
        "libcap-dev",
        "pkg-config",
        "build-essential",
      ]

- name: Download batman source
  ansible.builtin.get_url:
    url: "https://downloads.open-mesh.org/batman/releases/batman-adv-{{
      batman_version }}/batman-adv-{{ batman_version }}.tar.gz"
    dest: /opt/batman-adv-{{ batman_version }}.tar.gz
    mode: "0644"

- name: Unpack batman-adv
  ansible.builtin.unarchive:
    src: /opt/batman-adv-{{ batman_version }}.tar.gz
    dest: /usr/src
    remote_src: true
  when: not ansible_check_mode

- name: Delete batman-adv archive
  ansible.builtin.file:
    path: /opt/batman-adv-{{ batman_version }}.tar.gz
    state: absent

- name: Configure DKMS
  ansible.builtin.template:
    src: dkms.conf
    dest: /usr/src/batman-adv-{{ batman_version }}/dkms.conf
    mode: "0644"
  when: not ansible_check_mode

- name: Build and install batman-adv
  ansible.builtin.command: "dkms install -m batman-adv -v {{ batman_version }}"
  # notify: restart batman
  changed_when: false
  when: not ansible_check_mode

- name: Run modprobe for batman-adv
  ansible.builtin.command: modprobe batman-adv
  changed_when: false
  when: not ansible_check_mode

- name: Add batman-adv to modules
  ansible.builtin.lineinfile:
    path: /etc/modules
    line: batman-adv
  when: not ansible_check_mode

- name: Remove old batman-adv versions
  ansible.builtin.script: files/cleanup.py {{ batman_version }}
  args:
    executable: python3

- name: Set reboot required
  ansible.builtin.file:
    path: /var/run/reboot-required
    state: touch
    mode: "0644"
